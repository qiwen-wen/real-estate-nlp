services:
  - type: web
    name: idx-nlp-api
    runtime: docker
    dockerfilePath: ./scripts/api/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: API_RATE_LIMIT
        value: 60/second
      - key: PYTHONUNBUFFERED
        value: "1"
